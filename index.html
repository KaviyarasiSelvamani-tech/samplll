<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LinguaBridge</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#050816,#0f172a,#1e1b4b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:1000px;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:52px;
    background:linear-gradient(to right,#c084fc,#fb7185,#f59e0b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight:700;
}

.logo p{
    color:#94a3b8;
    margin-top:5px;
}

.card{
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:30px;
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.language-section{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.lang-box{
    flex:1;
}

.label{
    font-size:12px;
    color:#a78bfa;
    margin-bottom:8px;
    letter-spacing:1px;
}

select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

.swap-btn{
    width:50px;
    height:50px;
    border-radius:14px;
    border:none;
    background:#111827;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.swap-btn:hover{
    transform:rotate(180deg);
    background:#7c3aed;
}

.text-section{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.text-box{
    display:flex;
    flex-direction:column;
}

textarea{
    height:220px;
    resize:none;
    border:none;
    outline:none;
    border-radius:18px;
    padding:18px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

textarea::placeholder{
    color:#94a3b8;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.translate-btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#7c3aed,#ec4899);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.translate-btn:hover{
    transform:scale(1.02);
}

.icon-btn{
    width:55px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.icon-btn:hover{
    background:#7c3aed;
}

.history{
    margin-top:25px;
    background:rgba(15,23,42,0.75);
    border-radius:20px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.08);
}

.history h3{
    color:#c084fc;
    margin-bottom:15px;
}

.history-item{
    background:#111827;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    color:#cbd5e1;
}

@media(max-width:768px){

    .text-section{
        grid-template-columns:1fr;
    }

    .language-section{
        flex-direction:column;
    }

    .swap-btn{
        transform:rotate(90deg);
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>✦ LinguaBridge</h1>
        <p>Translate instantly across 50+ languages</p>
    </div>

    <div class="card">

        <div class="language-section">

                    <option value="en" selected>English</option>
                    <option value="eo">Esperanto</option>

                    <option value="is">Icelandic</option>

                    <option value="it">Italian</option>
                    <option value="ja">Japanese</option>
                    <option value="kn">Kannada</option>
                    <option value="ko">Korean</option>
                    <option value="la">Latin</option>
                    <option value="lv">Latvian</option>
                    <option value="lt">Lithuanian</option>
                    <option value="ms">Malay</option>
                    <option value="ml">Malayalam</option>
                    <option value="mr">Marathi</option>
                    <option value="no">Norwegian</option>
                    <option value="fa">Persian</option>
                    <option value="pl">Polish</option>
                    <option value="pt">Portuguese</option>
                    <option value="ro">Romanian</option>
                    <option value="ru">Russian</option>
                    <option value="sr">Serbian</option>
                    <option value="sk">Slovak</option>
                    <option value="sl">Slovenian</option>

                </select>
            </div>

            <button class="swap-btn" onclick="swapLanguages()">⇄</button>

            <div class="lang-box">
                <div class="label">TARGET LANGUAGE</div>
                <select id="targetLang">
                    <option value="af">Afrikaans</option>

                    <option value="hy">Armenian</option>

                    <option value="ca">Catalan</option>

                    <option value="hr">Croatian</option>
                    <option value="cs">Czech</option>
                    <option value="da">Danish</option>
                    <option value="nl">Dutch</option>
                    <option value="en">English</option>
                    <option value="eo">Esperanto</option>
                    <option value="et">Estonian</option>
                    <option value="fi">Finnish</option>
                    <option value="fr">French</option>
                    <option value="gl">Galician</option>
                    <option value="ka">Georgian</option>
                    <option value="de">German</option>
                    <option value="el">Greek</option>
                    <option value="gu">Gujarati</option>
                    <option value="he">Hebrew</option>
                    <option value="hi">Hindi</option>
                    <option value="hu">Hungarian</option>
                    <option value="is">Icelandic</option>
                    <option value="id">Indonesian</option>
                    <option value="ga">Irish</option>
                    <option value="it">Italian</option>
                    <option value="ja" selected>Japanese</option>
                    <option value="kn">Kannada</option>
                    <option value="ko">Korean</option>
                    <option value="la">Latin</option>
                    <option value="lv">Latvian</option>
                    <option value="lt">Lithuanian</option>
                    <option value="ms">Malay</option>
                    <option value="ml">Malayalam</option>
                    <option value="mr">Marathi</option>
                    <option value="no">Norwegian</option>
                    <option value="fa">Persian</option>
                    <option value="pl">Polish</option>
                    <option value="pt">Portuguese</option>
                    <option value="ro">Romanian</option>
                    <option value="ru">Russian</option>
                    <option value="sr">Serbian</option>
                    <option value="sk">Slovak</option>
                    <option value="sl">Slovenian</option>
                    <option value="es">Spanish</option>
                    <option value="sw">Swahili</option>
                    <option value="sv">Swedish</option>
                    <option value="ta">Tamil</option>
                    <option value="te">Telugu</option>
                    <option value="th">Thai</option>
                    <option value="tr">Turkish</option>
                    <option value="uk">Ukrainian</option>
                    <option value="ur">Urdu</option>
                    <option value="vi">Vietnamese</option>
                    <option value="cy">Welsh</option>
                </select>
            </div>

        </div>

        <div class="text-section">

            <div class="text-box">
                <div class="label">📝 INPUT TEXT</div>
                <textarea id="inputText" placeholder="Enter text here..."></textarea>
            </div>

            <div class="text-box">
                <div class="label">🌐 TRANSLATION</div>
                <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
            </div>

        </div>

        <div class="buttons">

            <button class="translate-btn" onclick="translateText()">
                ✨ Translate
            </button>

            <button class="icon-btn" onclick="copyText()">📋</button>

            <button class="icon-btn" onclick="speakText()">🔊</button>

            <button class="icon-btn" onclick="clearText()">🗑️</button>

        </div>

    </div>

    <div class="history">
        <h3>📜 Recent Translations</h3>
        <div id="historyList"></div>
    </div>

</div>

<script>

async function translateText(){
    const input = document.getElementById("inputText").value;
    const source = document.getElementById("sourceLang").value;
    const target = document.getElementById("targetLang").value;

    if(input.trim()===""){
        alert("Please enter text");
        return;
    }

    // Changed button text to show loading indicator safely
    const translateBtn = document.querySelector(".translate-btn");
    translateBtn.innerText = "⏳ Translating...";

    try {
        // Updated API source to use a secure official Google Translate environment proxy
        const url = `https://lingva.ml/api/v1/${source}/${target}/${encodeURIComponent(input)}`;
        
        const response = await fetch(url);
        const data = await response.json();

        if (data && data.translation) {
            const translated = data.translation;
            document.getElementById("outputText").value = translated;
            addToHistory(input, translated);
        } else {
            throw new Error("Fallback required");
        }
    }
    catch(error) {
        // Secure secondary fallback to MyMemory official filtered key in case proxy drops
        try {
            const backupUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=${source}|${target}&de=services.codealpha@gmail.com`;
            const backupResponse = await fetch(backupUrl);
            const backupData = await backupResponse.json();
            const translated = backupData.responseData.translatedText;
            document.getElementById("outputText").value = translated;
            addToHistory(input, translated);
        } catch(e) {
            alert("Translation service is currently unreachable.");
        }
    } finally {
        translateBtn.innerText = "✨ Translate";
    }
}

function copyText(){
    const text = document.getElementById("outputText");
    if(!text.value) return;
    navigator.clipboard.writeText(text.value);
    alert("Copied!");
}

function speakText(){
    const text = document.getElementById("outputText").value;
    if(!text) return;

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = document.getElementById("targetLang").value;
    window.speechSynthesis.speak(speech);
}

function clearText(){
    document.getElementById("inputText").value="";
    document.getElementById("outputText").value="";
}

function swapLanguages(){
    let source = document.getElementById("sourceLang");
    let target = document.getElementById("targetLang");

    let tempLang = source.value;
    source.value = target.value;
    target.value = tempLang;

    let inputText = document.getElementById("inputText").value;
    let outputText = document.getElementById("outputText").value;
    
    document.getElementById("inputText").value = outputText;
    document.getElementById("outputText").value = inputText;
}

function addToHistory(original,translated){
    const history = document.getElementById("historyList");
    const item = document.createElement("div");
    item.classList.add("history-item");

    item.innerHTML = `
        <b>${original}</b><br>
        ${translated}
    `;

    history.prepend(item);
}

</script>

</body>
</html>
